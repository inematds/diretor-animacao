# F0 piloto — "O Pequeno Príncipe: trailer" · 5 imagens MISTAS (1 foto-real + 4 ilustrações)
# Decupagem manual (gramática mdd + Ken Burns): alternância de movimento, câmera em função do beat.
schema: pixflow.movie/v1

meta:
  title: "Piloto F0 — Diretor de Animação"
  author: "diretor-animacao"

output:
  resolution: 1920x1080
  fps: 30
  filename: piloto-f0.mp4

defaults:
  look: cinema-dramatico
  transition_out:
    type: crossfade
    duration: 0.8

assets:
  images:
    - id: deserto
      file: assets/img/c1-deserto-foto.png   # FOTO-REAL (depth: Depth-Anything direto)
    - id: planeta
      file: assets/img/c2-planeta.png        # ilustração
    - id: rosa
      file: assets/img/c3-rosa.png           # ilustração
    - id: raposa
      file: assets/img/c4-raposa.png         # ilustração
    - id: estrelas
      file: assets/img/c5-estrelas.png       # ilustração

scenes:
  # BEAT 1 — estabelecer (queda no deserto). Regra: abertura ampla → PULL OUT revela a escala.
  - id: c1_deserto
    image: deserto
    duration: 6.165
    camera: { type: pull_out, intensity: 1.2, easing: ease_in_out }

  # BEAT 2 — encanto (planeta minúsculo). Objeto/mundo → ORBIT mostra tridimensionalidade.
  - id: c2_planeta
    image: planeta
    duration: 7.083
    look: sonho-etereo
    camera: { type: orbit, intensity: 1.0, easing: ease_in_out }

  # BEAT 3 — importância (a rosa única). Detalhe de valor → PUSH IN lento cria tensão/foco.
  - id: c3_rosa
    image: rosa
    duration: 5.867
    camera: { type: push_in, intensity: 1.1, easing: ease_in_out }

  # BEAT 4 — ternura (a raposa, os laços). Conexão entre dois sujeitos → PAN desdobra a relação.
  - id: c4_raposa
    image: raposa
    duration: 6.805
    look: sonho-etereo
    camera: { type: pan, direction: right, intensity: 1.0, easing: ease_in_out }

  # BEAT 5 — contemplação (o essencial é invisível). Clímax reflexivo → PUSH IN muito lento ao céu.
  - id: c5_estrelas
    image: estrelas
    duration: 6.805
    camera: { type: push_in, intensity: 0.7, easing: ease_out }
    transition_out: { type: dip_to_black, duration: 1.0 }

audio:
  track: assets/audio/narracao.wav
